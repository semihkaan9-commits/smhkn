      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom Animations */
      @keyframes fade-in-up {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fade-in-up 0.6s ease-out forwards;
      }
      .animate-delay-100 {
        animation-delay: 0.1s;
      }
      .animate-delay-200 {
        animation-delay: 0.2s;
      }
    </style>
